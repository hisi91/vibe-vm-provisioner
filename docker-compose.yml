# =============================================================================
# ansible/files/docker-compose.yml — Stack code-server (VS Code in the browser)
# Variables externalisées dans .env généré par Ansible (aucun secret en clair).
# Démarrage : docker compose up -d
# =============================================================================

services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      # Mot de passe d'accès — injecté depuis .env (jamais en clair ici)
      PASSWORD: "${CS_PASSWORD}"
      # Désactive la télémétrie Coder
      DISABLE_TELEMETRY: "true"

    volumes:
      # Code source à éditer
      - "${WORKSPACE_DIR}:/home/coder/workspace:rw"
      # Config code-server (config.yaml)
      - "${CS_CONFIG_DIR}:/home/coder/.config/code-server:rw"
      # Extensions VS Code persistées entre les redémarrages
      - "${CS_EXTENSIONS_DIR}:/home/coder/.local/share/code-server/extensions:rw"
      # Settings utilisateur VS Code
      - "${CS_VSCODE_DIR}:/home/coder/.local/share/code-server/User:rw"
      # Accès au socket Docker pour éventuels usages (optionnel)
      - /var/run/docker.sock:/var/run/docker.sock

    user: "${TARGET_USER:-1000}"

    working_dir: /home/coder/workspace

    command: >
      --bind-addr 0.0.0.0:8080
      --auth password
      --disable-telemetry
      /home/coder/workspace

    # HTTPS self-signed géré nativement par code-server
    # (cert auto-généré au premier démarrage dans ~/.config/code-server/)

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Ressources (ajuster selon la VM)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"
