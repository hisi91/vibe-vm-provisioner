# =============================================================================
# ansible/provision.yml — Playbook principal de provisioning vibe-coding VM
# Exécute dans l'ordre : apt, Docker CE, nvm+Node+Gemini CLI, clone workspace,
# code-server (Docker), settings VS Code, extensions, ufw, health check.
# Idempotent : rejouable sans effet de bord.
# =============================================================================

---
- name: "Vibe-coding VM — Provisioning complet"
  hosts: vibe_vm
  become: true
  gather_facts: true

  vars:
    node_version: "lts/*"
    nvm_version: "v0.39.7"
    nvm_dir: "/home/{{ target_user }}/.nvm"
    workspace_dir: "/home/{{ target_user }}/workspace"
    cs_config_dir: "/home/{{ target_user }}/.config/code-server"
    cs_vscode_dir: "/home/{{ target_user }}/.local/share/code-server/User"
    cs_extensions_dir: "/home/{{ target_user }}/.local/share/code-server/extensions"
    compose_dir: "/home/{{ target_user }}/code-server"
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    apt_packages:
      - curl
      - git
      - unzip
      - build-essential
      - python3
      - python3-pip
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - acl

  # ─── A) APT : paquets système ──────────────────────────────────────────────
  tasks:
    - name: "APT | Mise à jour du cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "APT | Installation des paquets système"
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

  # ─── B) Docker CE ──────────────────────────────────────────────────────────
    - name: "Docker | Création du répertoire keyrings"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: "Docker | Téléchargement de la clé GPG officielle"
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: "Docker | Ajout du dépôt officiel"
      ansible.builtin.apt_repository:
        repo: >
          deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: "Docker | Installation de Docker CE"
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: "Docker | Déploiement de daemon.json"
      ansible.builtin.copy:
        src: files/daemon.json
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    - name: "Docker | Ajout de {{ target_user }} au groupe docker"
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: "Docker | Activation et démarrage du service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

  # ─── C) nvm + Node LTS + Gemini CLI ───────────────────────────────────────
    - name: "nvm | Vérification de l'installation"
      ansible.builtin.stat:
        path: "{{ nvm_dir }}/nvm.sh"
      register: nvm_installed

    - name: "nvm | Installation de nvm {{ nvm_version }}"
      become: false
      ansible.builtin.shell:
        cmd: >
          curl -fsSL
          https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh
          | bash
      when: not nvm_installed.stat.exists

    - name: "nvm | Installation de Node {{ node_version }}"
      become: false
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          source "$NVM_DIR/nvm.sh"
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}
        executable: /bin/bash
      register: node_install
      changed_when: "'already installed' not in node_install.stdout"

    - name: "Gemini CLI | Installation globale de @google/gemini-cli"
      become: false
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          source "$NVM_DIR/nvm.sh"
          npm list -g @google/gemini-cli 2>/dev/null | grep gemini-cli \
            || npm install -g @google/gemini-cli
        executable: /bin/bash
      register: gemini_install
      changed_when: "'added' in gemini_install.stdout"

    - name: "Gemini CLI | Injection de GEMINI_API_KEY dans .bashrc"
      become: false
      ansible.builtin.blockinfile:
        path: "/home/{{ target_user }}/.bashrc"
        marker: "# {mark} GEMINI CLI — géré par Ansible"
        block: |
          export GEMINI_API_KEY="{{ gemini_api_key }}"
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && source "$NVM_DIR/bash_completion"
        create: true
        mode: "0644"

  # ─── D) Clone du workspace ─────────────────────────────────────────────────
    - name: "Workspace | Création du répertoire"
      become: false
      ansible.builtin.file:
        path: "{{ workspace_dir }}"
        state: directory
        mode: "0755"

    - name: "Workspace | Clone du repo {{ workspace_repo }}"
      become: false
      ansible.builtin.git:
        repo: "{{ workspace_repo }}"
        dest: "{{ workspace_dir }}"
        update: false          # idempotent : ne re-clone pas si déjà présent
        force: false
      ignore_errors: true       # si repo privé sans token, on continue

  # ─── E) code-server via Docker Compose ────────────────────────────────────
    - name: "code-server | Création du répertoire de déploiement"
      become: false
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0755"

    - name: "code-server | Déploiement de docker-compose.yml"
      become: false
      ansible.builtin.copy:
        src: files/docker-compose.yml
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    - name: "code-server | Génération du fichier .env pour compose"
      become: false
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/.env"
        mode: "0600"
        content: |
          CS_PASSWORD={{ cs_password }}
          TARGET_USER={{ target_user }}
          WORKSPACE_DIR={{ workspace_dir }}
          CS_CONFIG_DIR={{ cs_config_dir }}
          CS_EXTENSIONS_DIR={{ cs_extensions_dir }}
          CS_VSCODE_DIR={{ cs_vscode_dir }}

  # ─── F) settings.json VS Code ──────────────────────────────────────────────
    - name: "VS Code | Création du répertoire User settings"
      become: false
      ansible.builtin.file:
        path: "{{ cs_vscode_dir }}"
        state: directory
        mode: "0755"

    - name: "VS Code | Injection du settings.json"
      become: false
      ansible.builtin.copy:
        src: files/settings.json
        dest: "{{ cs_vscode_dir }}/settings.json"
        mode: "0644"

  # ─── G) Extensions VS Code ─────────────────────────────────────────────────
    - name: "Extensions | Création du répertoire extensions"
      become: false
      ansible.builtin.file:
        path: "{{ cs_extensions_dir }}"
        state: directory
        mode: "0755"

    - name: "Extensions | Démarrage temporaire de code-server pour installer les extensions"
      become: false
      ansible.builtin.shell:
        cmd: |
          docker pull codercom/code-server:latest
          docker run --rm -d --name cs-ext-install \
            -v "{{ cs_extensions_dir }}:/home/coder/.local/share/code-server/extensions" \
            -e PASSWORD="{{ cs_password }}" \
            codercom/code-server:latest
          sleep 5
          for ext in ms-python.python dbaeumer.vscode-eslint esbenp.prettier-vscode; do
            docker exec cs-ext-install \
              /usr/bin/code-server --install-extension "$ext" 2>/dev/null || true
          done
          docker stop cs-ext-install
        executable: /bin/bash
      register: ext_result
      changed_when: "'Extension' in ext_result.stdout"
      failed_when: false

    - name: "Extensions | Démarrage de code-server via Docker Compose"
      become: false
      ansible.builtin.shell:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ compose_dir }}"
        executable: /bin/bash

  # ─── H) ufw — Pare-feu ─────────────────────────────────────────────────────
    - name: "ufw | Autorisation SSH (22)"
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "ufw | Autorisation code-server (8080)"
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: "ufw | Activation du pare-feu"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

  # ─── I) Health check ───────────────────────────────────────────────────────
    - name: "Health check | Attente que code-server réponde (5 tentatives)"
      ansible.builtin.uri:
        url: "https://localhost:8080"
        validate_certs: false
        status_code: [200, 302, 401]
      register: health
      retries: 5
      delay: 10
      until: health.status in [200, 302, 401]
      ignore_errors: false

    - name: "Health check | ✔ code-server opérationnel"
      ansible.builtin.debug:
        msg: "code-server répond sur https://{{ ansible_host }}:8080 (status {{ health.status }})"

  # ─── Handlers ──────────────────────────────────────────────────────────────
  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
