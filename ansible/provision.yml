# =============================================================================
# ansible/provision.yml — Provisioning vibe-coding VM (code-server natif + Ruflo)
# code-server installé directement sur la machine, pas via Docker
# Accès : http://<IP>:8080
# =============================================================================

---
- name: "Vibe-coding VM — Provisioning complet"
  hosts: vibe_vm
  become: true
  gather_facts: true

  vars:
    node_version: "lts/*"
    nvm_version: "v0.39.7"
    user_home: "{{ '/root' if target_user == 'root' else '/home/' + target_user }}"
    nvm_dir: "{{ user_home }}/.nvm"
    workspace_dir: "{{ user_home }}/workspace"
    cs_config_dir: "{{ user_home }}/.config/code-server"
    cs_vscode_dir: "{{ user_home }}/.local/share/code-server/User"
    apt_packages:
      - curl
      - git
      - unzip
      - build-essential
      - python3
      - python3-pip
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - acl
      - wget

  tasks:

  # ─── A) APT ────────────────────────────────────────────────────────────────
    - name: "APT | Mise à jour du cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "APT | Installation des paquets système"
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

  # ─── B) nvm + Node LTS + outils globaux ───────────────────────────────────
    - name: "nvm + Node | Installation"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          export HOME="{{ user_home }}"

          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
          fi

          source "$NVM_DIR/nvm.sh"
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}
        executable: /bin/bash
      register: nvm_result
      changed_when: "'already installed' not in nvm_result.stdout"

    - name: "npm global | Installation de tous les outils IA"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          source "$NVM_DIR/nvm.sh"

          # Gemini CLI
          npm list -g @google/gemini-cli 2>/dev/null | grep -q gemini-cli \
            || npm install -g @google/gemini-cli

          # TypeScript
          npm list -g typescript 2>/dev/null | grep -q typescript \
            || npm install -g typescript

          # Ruflo (orchestrateur multi-agents Claude)
          npm list -g ruflo 2>/dev/null | grep -q ruflo \
            || npm install -g ruflo@latest

          # agentic-flow (embeddings/routing pour Ruflo)
          npm list -g agentic-flow 2>/dev/null | grep -q agentic-flow \
            || npm install -g agentic-flow
        executable: /bin/bash
      register: npm_global
      changed_when: "'added' in npm_global.stdout"

    - name: "env | Injection dans .bashrc"
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} VIBE-CODING ENV — géré par Ansible"
        block: |
          # nvm
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && source "$NVM_DIR/bash_completion"

          # Clés API
          export GEMINI_API_KEY="{{ gemini_api_key }}"
          export ANTHROPIC_API_KEY="{{ anthropic_api_key }}"
        create: true
        mode: "0644"

  # ─── C) Clone du workspace ─────────────────────────────────────────────────
    - name: "Workspace | Création du répertoire"
      ansible.builtin.file:
        path: "{{ workspace_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"

    - name: "Workspace | Clone du repo"
      ansible.builtin.git:
        repo: "{{ workspace_repo }}"
        dest: "{{ workspace_dir }}"
        update: false
        force: false
      ignore_errors: true

  # ─── D) Ruflo — initialisation du projet ──────────────────────────────────
    - name: "Ruflo | Initialisation dans le workspace"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          export HOME="{{ user_home }}"
          export ANTHROPIC_API_KEY="{{ anthropic_api_key }}"
          source "$NVM_DIR/nvm.sh"

          cd {{ workspace_dir }}

          # Init seulement si pas déjà fait
          if [ ! -f ".claude-flow/config.yaml" ]; then
            ruflo init --yes 2>/dev/null || true
          fi

          # Initialiser la mémoire vectorielle
          ruflo memory init 2>/dev/null || true
        executable: /bin/bash
      changed_when: false

    - name: "Ruflo | Service daemon via systemd"
      ansible.builtin.copy:
        dest: /etc/systemd/system/ruflo-daemon.service
        mode: "0644"
        content: |
          [Unit]
          Description=Ruflo AI Agent Daemon
          After=network.target

          [Service]
          Type=simple
          User={{ target_user }}
          WorkingDirectory={{ workspace_dir }}
          Environment="HOME={{ user_home }}"
          Environment="NVM_DIR={{ nvm_dir }}"
          Environment="ANTHROPIC_API_KEY={{ anthropic_api_key }}"
          Environment="GEMINI_API_KEY={{ gemini_api_key }}"
          ExecStartPre=/bin/bash -c 'source {{ nvm_dir }}/nvm.sh'
          ExecStart=/bin/bash -c 'source {{ nvm_dir }}/nvm.sh && ruflo daemon start --foreground'
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: "Ruflo | Activation du daemon"
      ansible.builtin.systemd:
        name: ruflo-daemon
        enabled: true
        state: started
        daemon_reload: true
      ignore_errors: true

  # ─── E) code-server natif ─────────────────────────────────────────────────
    - name: "code-server | Vérification si déjà installé"
      ansible.builtin.stat:
        path: /usr/bin/code-server
      register: cs_binary

    - name: "code-server | Installation via script officiel"
      ansible.builtin.shell:
        cmd: curl -fsSL https://code-server.dev/install.sh | sh
        executable: /bin/bash
      when: not cs_binary.stat.exists

    - name: "code-server | Création du répertoire de config"
      ansible.builtin.file:
        path: "{{ cs_config_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        recurse: true

    - name: "code-server | Génération de config.yaml"
      ansible.builtin.copy:
        dest: "{{ cs_config_dir }}/config.yaml"
        owner: "{{ target_user }}"
        mode: "0600"
        content: |
          bind-addr: 0.0.0.0:8080
          auth: password
          password: {{ cs_password }}
          cert: false

  # ─── F) settings.json VS Code ──────────────────────────────────────────────
    - name: "VS Code | Création du répertoire User"
      ansible.builtin.file:
        path: "{{ cs_vscode_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        recurse: true

    - name: "VS Code | Injection du settings.json"
      ansible.builtin.copy:
        src: files/settings.json
        dest: "{{ cs_vscode_dir }}/settings.json"
        owner: "{{ target_user }}"
        mode: "0644"

  # ─── G) Extensions VS Code ─────────────────────────────────────────────────
    - name: "Extensions | Installation"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          source "$NVM_DIR/nvm.sh"
          for ext in ms-python.python dbaeumer.vscode-eslint esbenp.prettier-vscode; do
            code-server --install-extension "$ext" --force 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: false

    - name: "code-server | Activation via systemd"
      ansible.builtin.systemd:
        name: "code-server@{{ target_user }}"
        enabled: true
        state: restarted
        daemon_reload: true

  # ─── H) ufw ────────────────────────────────────────────────────────────────
    - name: "ufw | Autorisation SSH (22)"
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "ufw | Autorisation code-server (8080)"
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: "ufw | Activation"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

  # ─── I) Health check ───────────────────────────────────────────────────────
    - name: "Health check | Attente que code-server réponde"
      ansible.builtin.uri:
        url: "http://localhost:8080"
        validate_certs: false
        status_code: [200, 302, 401]
      register: health
      retries: 5
      delay: 10
      until: health.status in [200, 302, 401]

    - name: "Health check | Ruflo doctor"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          export HOME="{{ user_home }}"
          export ANTHROPIC_API_KEY="{{ anthropic_api_key }}"
          source "$NVM_DIR/nvm.sh"
          cd {{ workspace_dir }}
          ruflo doctor 2>/dev/null || true
        executable: /bin/bash
      register: ruflo_doctor
      changed_when: false

    - name: "Health check | Résumé Ruflo"
      ansible.builtin.debug:
        msg: "{{ ruflo_doctor.stdout_lines[-3:] }}"

    - name: "Health check | ✔ Stack complète opérationnelle"
      ansible.builtin.debug:
        msg:
          - "✔ code-server  → http://{{ ansible_host }}:8080"
          - "✔ gemini CLI   → taper 'gemini' dans le terminal"
          - "✔ ruflo        → taper 'ruflo doctor' dans le terminal"
          - "✔ workspace    → {{ workspace_dir }}"