# =============================================================================
# ansible/provision.yml — Playbook principal de provisioning vibe-coding VM
# =============================================================================

---
- name: "Vibe-coding VM — Provisioning complet"
  hosts: vibe_vm
  become: true
  gather_facts: true

  vars:
    node_version: "lts/*"
    nvm_version: "v0.39.7"
    # Gère root (/root) et les autres users (/home/user)
    user_home: "{{ '/root' if target_user == 'root' else '/home/' + target_user }}"
    nvm_dir: "{{ user_home }}/.nvm"
    workspace_dir: "{{ user_home }}/workspace"
    cs_config_dir: "{{ user_home }}/.config/code-server"
    cs_vscode_dir: "{{ user_home }}/.local/share/code-server/User"
    cs_extensions_dir: "{{ user_home }}/.local/share/code-server/extensions"
    compose_dir: "{{ user_home }}/code-server"
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    apt_packages:
      - curl
      - git
      - unzip
      - build-essential
      - python3
      - python3-pip
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - acl

  tasks:
  # ─── A) APT ────────────────────────────────────────────────────────────────
    - name: "APT | Mise à jour du cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "APT | Installation des paquets système"
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

  # ─── B) Docker CE ──────────────────────────────────────────────────────────
    - name: "Docker | Création du répertoire keyrings"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: "Docker | Téléchargement de la clé GPG officielle"
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: "Docker | Ajout du dépôt officiel"
      ansible.builtin.apt_repository:
        repo: >
          deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: "Docker | Installation de Docker CE"
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: "Docker | Déploiement de daemon.json"
      ansible.builtin.copy:
        src: files/daemon.json
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    - name: "Docker | Ajout de {{ target_user }} au groupe docker"
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: "Docker | Activation et démarrage du service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

  # ─── C) nvm + Node LTS + Gemini CLI ───────────────────────────────────────
    - name: "nvm + Node + Gemini CLI | Installation complète en une passe"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          export HOME="{{ user_home }}"

          # Installer nvm si absent
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
          fi

          # Charger nvm
          source "$NVM_DIR/nvm.sh"

          # Installer Node LTS si absent
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}

          # Installer Gemini CLI si absent
          npm list -g @google/gemini-cli 2>/dev/null | grep -q gemini-cli \
            || npm install -g @google/gemini-cli
        executable: /bin/bash
      register: nvm_result
      changed_when: "'already installed' not in nvm_result.stdout"

    - name: "Gemini CLI | Injection dans .bashrc"
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} GEMINI CLI — géré par Ansible"
        block: |
          export GEMINI_API_KEY="{{ gemini_api_key }}"
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && source "$NVM_DIR/bash_completion"
        create: true
        mode: "0644"

  # ─── D) Clone du workspace ─────────────────────────────────────────────────
    - name: "Workspace | Création du répertoire"
      ansible.builtin.file:
        path: "{{ workspace_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"

    - name: "Workspace | Clone du repo"
      ansible.builtin.git:
        repo: "{{ workspace_repo }}"
        dest: "{{ workspace_dir }}"
        update: false
        force: false
      ignore_errors: true

  # ─── E) code-server via Docker Compose ────────────────────────────────────
    - name: "code-server | Création du répertoire de déploiement"
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"

    - name: "code-server | Déploiement de docker-compose.yml"
      ansible.builtin.copy:
        src: files/docker-compose.yml
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    - name: "code-server | Génération du .env pour compose"
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/.env"
        mode: "0600"
        content: |
          CS_PASSWORD={{ cs_password }}
          TARGET_USER={{ target_user }}
          WORKSPACE_DIR={{ workspace_dir }}
          CS_CONFIG_DIR={{ cs_config_dir }}
          CS_EXTENSIONS_DIR={{ cs_extensions_dir }}
          CS_VSCODE_DIR={{ cs_vscode_dir }}

  # ─── F) settings.json VS Code ──────────────────────────────────────────────
    - name: "VS Code | Création du répertoire User settings"
      ansible.builtin.file:
        path: "{{ cs_vscode_dir }}"
        state: directory
        mode: "0755"
        recurse: true

    - name: "VS Code | Injection du settings.json"
      ansible.builtin.copy:
        src: files/settings.json
        dest: "{{ cs_vscode_dir }}/settings.json"
        mode: "0644"

  # ─── G) Extensions + démarrage code-server ─────────────────────────────────
    - name: "Extensions | Création du répertoire"
      ansible.builtin.file:
        path: "{{ cs_extensions_dir }}"
        state: directory
        mode: "0755"
        recurse: true

    - name: "Extensions | Installation via container éphémère"
      ansible.builtin.shell:
        cmd: |
          docker pull codercom/code-server:latest
          docker run --rm -d --name cs-ext-install \
            -v "{{ cs_extensions_dir }}:/home/coder/.local/share/code-server/extensions" \
            -e PASSWORD="{{ cs_password }}" \
            codercom/code-server:latest
          sleep 8
          for ext in ms-python.python dbaeumer.vscode-eslint esbenp.prettier-vscode; do
            docker exec cs-ext-install \
              /usr/bin/code-server --install-extension "$ext" 2>/dev/null || true
          done
          docker stop cs-ext-install || true
        executable: /bin/bash
      failed_when: false

    - name: "code-server | Démarrage via Docker Compose"
      ansible.builtin.shell:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ compose_dir }}"
        executable: /bin/bash

  # ─── H) ufw ────────────────────────────────────────────────────────────────
    - name: "ufw | Autorisation SSH (22)"
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "ufw | Autorisation code-server (8080)"
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: "ufw | Activation"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

  # ─── I) Health check ───────────────────────────────────────────────────────
    - name: "Health check | Attente que code-server réponde"
      ansible.builtin.uri:
        url: "https://localhost:8080"
        validate_certs: false
        status_code: [200, 302, 401]
      register: health
      retries: 5
      delay: 10
      until: health.status in [200, 302, 401]

    - name: "Health check | ✔ code-server opérationnel"
      ansible.builtin.debug:
        msg: "✔ code-server répond sur https://{{ ansible_host }}:8080 (HTTP {{ health.status }})"

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
