# =============================================================================
# ansible/provision.yml — Provisioning vibe-coding VM (code-server natif)
# code-server installé directement sur la machine (natif, sans Docker)
# Accès : http://<IP>:8080
# =============================================================================

---
- name: "Vibe-coding VM — Provisioning complet"
  hosts: vibe_vm
  become: true
  gather_facts: true

  vars:
    node_version: "lts/*"
    nvm_version: "v0.39.7"
    user_home: "{{ '/root' if target_user == 'root' else '/home/' + target_user }}"
    nvm_dir: "{{ user_home }}/.nvm"
    workspace_dir: "{{ user_home }}/workspace"
    cs_config_dir: "{{ user_home }}/.config/code-server"
    cs_vscode_dir: "{{ user_home }}/.local/share/code-server/User"
    apt_packages:
      - curl
      - git
      - unzip
      - build-essential
      - python3
      - python3-pip
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - acl
      - wget

  tasks:

  # ─── A) APT ────────────────────────────────────────────────────────────────
    - name: "APT | Mise à jour du cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "APT | Installation des paquets système"
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
  # ─── C) nvm + Node LTS + Gemini CLI ───────────────────────────────────────
    - name: "nvm + Node + Gemini CLI | Installation"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          export HOME="{{ user_home }}"

          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
          fi

          source "$NVM_DIR/nvm.sh"
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}

          npm list -g @google/gemini-cli 2>/dev/null | grep -q gemini-cli \
            || npm install -g @google/gemini-cli
        executable: /bin/bash
      register: nvm_result
      changed_when: "'already installed' not in nvm_result.stdout"

    - name: "nvm | Injection dans .bashrc"
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} NVM + GEMINI — géré par Ansible"
        block: |
          export GEMINI_API_KEY="{{ gemini_api_key }}"
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && source "$NVM_DIR/bash_completion"
        create: true
        mode: "0644"

  # ─── D) Clone du workspace ─────────────────────────────────────────────────
    - name: "Workspace | Création du répertoire"
      ansible.builtin.file:
        path: "{{ workspace_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"

    - name: "Workspace | Clone du repo"
      ansible.builtin.git:
        repo: "{{ workspace_repo }}"
        dest: "{{ workspace_dir }}"
        update: false
        force: false
      ignore_errors: true

  # ─── E) code-server natif (sans Docker) ───────────────────────────────────
    - name: "code-server | Vérification si déjà installé"
      ansible.builtin.stat:
        path: /usr/bin/code-server
      register: cs_binary

    - name: "code-server | Installation via script officiel"
      ansible.builtin.shell:
        cmd: curl -fsSL https://code-server.dev/install.sh | sh
        executable: /bin/bash
      when: not cs_binary.stat.exists

    - name: "code-server | Création du répertoire de config"
      ansible.builtin.file:
        path: "{{ cs_config_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        recurse: true

    - name: "code-server | Génération de config.yaml"
      ansible.builtin.copy:
        dest: "{{ cs_config_dir }}/config.yaml"
        owner: "{{ target_user }}"
        mode: "0600"
        content: |
          bind-addr: 0.0.0.0:8080
          auth: password
          password: {{ cs_password }}
          cert: false

  # ─── F) settings.json VS Code ──────────────────────────────────────────────
    - name: "VS Code | Création du répertoire User"
      ansible.builtin.file:
        path: "{{ cs_vscode_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        recurse: true

    - name: "VS Code | Injection du settings.json"
      ansible.builtin.copy:
        src: files/settings.json
        dest: "{{ cs_vscode_dir }}/settings.json"
        owner: "{{ target_user }}"
        mode: "0644"

  # ─── G) Extensions VS Code ─────────────────────────────────────────────────
    - name: "Extensions | Installation"
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          source "$NVM_DIR/nvm.sh"
          for ext in ms-python.python dbaeumer.vscode-eslint esbenp.prettier-vscode; do
            code-server --install-extension "$ext" --force 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: false

  # ─── H) code-server comme service systemd ─────────────────────────────────
    - name: "systemd | Activation et démarrage de code-server"
      ansible.builtin.systemd:
        name: "code-server@{{ target_user }}"
        enabled: true
        state: restarted
        daemon_reload: true

  # ─── I) ufw ────────────────────────────────────────────────────────────────
    - name: "ufw | Autorisation SSH (22)"
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "ufw | Autorisation code-server (8080)"
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: "ufw | Activation"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

  # ─── J) Health check ───────────────────────────────────────────────────────
    - name: "Health check | Attente que code-server réponde"
      ansible.builtin.uri:
        url: "http://localhost:8080"
        validate_certs: false
        status_code: [200, 302, 401]
      register: health
      retries: 5
      delay: 10
      until: health.status in [200, 302, 401]

    - name: "Health check | ✔ code-server opérationnel"
      ansible.builtin.debug:
        msg: "✔ code-server répond sur http://{{ ansible_host }}:8080 (HTTP {{ health.status }})"